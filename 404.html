<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Page Not Found</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);

overflow:hidden;
color:white;

}

.container{

text-align:center;

padding:40px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border-radius:25px;

box-shadow:0 20px 60px rgba(0,0,0,.5);

max-width:700px;

width:90%;

}

h1{

font-size:120px;

color:#8b5cf6;

margin-bottom:10px;

text-shadow:0 0 25px #8b5cf6;

}

h2{

font-size:35px;

margin-bottom:20px;

}

p{

font-size:20px;

color:#ddd;

margin-bottom:35px;

line-height:1.6;

}

a{

display:inline-block;

padding:15px 35px;

background:#8b5cf6;

color:white;

text-decoration:none;

border-radius:50px;

font-size:18px;

transition:.3s;

}

a:hover{

background:#6d28d9;

transform:translateY(-4px);

}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or has been moved.
</p>

<a href="index.html">
🏠 Back to Home
</a>

</div>

</body>

</html>
